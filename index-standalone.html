<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 인력 관리 - 타임라인 (오프라인)</title>

  <!-- CDN: Day.js + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/plugin/isoWeek.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/plugin/weekOfYear.js"></script>

  <!-- CDN: Dexie.js -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.4.4/dist/dexie.js"></script>

  <!-- CDN: Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>

  <style>
/* === RESET & BASE === */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf7f0;
  --surface: #ffffff;
  --surface-2: #f4efe4;
  --surface-hi: #ffffff;
  --border: #ece5d5;
  --border-strong: #dccfb8;
  --ink: #2b2823;
  --ink-2: #4a453d;
  --muted: #8a8072;
  --faint: #c4bba8;
  --accent: #c96442;
  --accent-2: #b55a3b;
  --accent-soft: rgba(201, 100, 66, 0.10);
  --accent-glow: rgba(201, 100, 66, 0.22);
  --danger: #b3413a;
  --warn: #d48b23;
  --ok: #4a7c59;
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue',
               'Noto Sans KR', system-ui, sans-serif;
  font-feature-settings: 'ss01', 'cv11';
  background: var(--bg);
  color: var(--ink);
  overflow: hidden;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === HEADER === */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 40;
}

.header-left { display: flex; align-items: center; gap: 20px; }
.header-left h1 {
  font-family: 'Charter', 'Iowan Old Style', 'Palatino', 'Georgia', serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.year-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2px;
}
.year-display {
  font-weight: 500;
  font-size: 13px;
  min-width: 58px;
  text-align: center;
  color: var(--ink);
}

.header-right { display: flex; gap: 8px; align-items: center; }

/* === BUTTONS === */
.btn {
  padding: 8px 14px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--ink);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
  font-family: inherit;
}
.btn:hover { background: var(--surface-hi); border-color: var(--ink-2); }
.btn:active { transform: translateY(1px); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-icon {
  padding: 6px 10px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  border-radius: 6px;
}
.btn-icon:hover { background: var(--surface-2); color: var(--ink); }

.btn-icon-small {
  padding: 3px 9px;
  background: var(--accent-soft);
  border: 1px solid rgba(201, 100, 66, 0.28);
  border-radius: 6px;
  cursor: pointer;
  font-size: 11.5px;
  color: var(--accent-2);
  font-weight: 500;
  margin-left: 8px;
  transition: all 0.15s;
}
.btn-icon-small:hover { background: rgba(201, 100, 66, 0.18); border-color: var(--accent); color: white; background-color: var(--accent); }

.btn-danger {
  background: rgba(179, 65, 58, 0.10) !important;
  border-color: rgba(179, 65, 58, 0.30) !important;
  color: var(--danger) !important;
  padding: 3px 8px !important;
  margin-left: 4px !important;
}
.btn-danger:hover {
  background: var(--danger) !important;
  border-color: var(--danger) !important;
  color: white !important;
}

.btn-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 28px; height: 28px;
  padding: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
}
.btn-close:hover { color: var(--ink); background: var(--surface); }

/* === FILTERS === */
.filters {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 8px;
}
.filter-select {
  padding: 6px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
  font-size: 12.5px;
  max-width: 180px;
  cursor: pointer;
  font-family: inherit;
}
.filter-select:hover { border-color: var(--ink-2); }
.filter-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* === TIMELINE CONTAINER === */
.timeline-container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 65px);
  background: var(--bg);
  overflow: hidden;
}

/* === GRID: name | count | memo | 52 weeks (narrower) === */
.timeline-grid,
.timeline-rows {
  display: grid;
  grid-template-columns: 220px 50px 160px repeat(52, 42px);
  gap: 0;
  width: max-content;
}

.timeline-rows {
  flex: 1;
  overflow: auto;
  align-content: start;
  background: var(--surface);
}

.header-row {
  flex-shrink: 0;
  background: var(--surface);
  color: var(--ink);
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--border-strong);
}

/* === ROW STYLES === */
.row { display: contents; }

.cell {
  height: 34px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: crosshair;
  user-select: none;
  position: relative;
  transition: background 0.12s ease;
}

.cell.filled {
  background: var(--project-color, var(--accent));
  opacity: 0.88;
}
.cell.preview {
  background: var(--project-color, var(--accent));
  opacity: 0.35;
}

/* Member row: warm neutral single tone */
.member-row .cell.filled {
  background: #8a8072;
  opacity: 1;
}
.member-row .cell.preview {
  background: #8a8072;
  opacity: 0.35;
}

.project-row .project-cell {
  background: var(--surface);
}
.project-row .project-cell:hover { background: var(--surface-2); }
.member-row .cell:not(.filled):not(.preview):hover { background: var(--surface-2); }

/* Project memo indicator dot */
.cell.has-memo::after {
  content: '';
  position: absolute;
  top: 3px; right: 3px;
  width: 6px; height: 6px;
  background: var(--warn);
  border-radius: 50%;
  box-shadow: 0 0 5px rgba(212, 139, 35, 0.5);
  pointer-events: none;
}

/* === NAME CELLS === */
.name-cell {
  position: sticky;
  left: 0;
  z-index: 15;
  background: var(--surface);
  border-right: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.header-name {
  background: var(--surface-2);
  color: var(--ink);
  font-weight: 600;
  z-index: 30;
  letter-spacing: 0.2px;
  font-size: 12px;
}

.header-cell {
  background: var(--surface);
  color: var(--muted);
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  border-right: 1px solid var(--border);
}

.header-info {
  background: var(--surface-2);
  font-size: 11.5px;
  color: var(--ink-2);
  padding: 0 8px;
  letter-spacing: 0.2px;
  font-weight: 500;
}

.week-header {
  flex-direction: column;
  gap: 0;
  padding: 3px 0;
  line-height: 1.15;
}
.week-num {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.2px;
}
.week-date {
  font-size: 8.5px;
  color: var(--muted);
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  letter-spacing: -0.3px;
}
.week-date + .week-date { color: var(--faint); }

.info-cell {
  background: var(--surface);
  cursor: default;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  padding: 0 6px;
  border-right: 1px solid var(--border);
  color: var(--ink-2);
}

.current-cell { padding: 0; }
.current-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--faint);
  background: transparent;
  transition: all 0.2s ease;
}
.current-dot.active {
  border-color: transparent;
}

/* === PROJECT NAME ROW === */
.project-name {
  background: var(--surface-2);
  color: var(--ink);
  font-weight: 600;
  cursor: pointer;
  padding: 0 12px;
  transition: background 0.15s;
  font-family: 'Charter', 'Iowan Old Style', 'Palatino', 'Georgia', serif;
  font-size: 14px;
  letter-spacing: -0.01em;
}
.project-name:hover { background: #eae2d3; }
.project-name .spacer { flex: 1; }

.project-color-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
}

.project-row.drop-target .project-name {
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 2px var(--accent);
}

/* === MEMBER NAME ROW === */
.member-name {
  padding-left: 28px;
  cursor: pointer;
  color: var(--ink-2);
  font-weight: 500;
}
.member-name:hover {
  background: var(--surface-2);
  color: var(--ink);
}
.drag-handle {
  color: var(--faint);
  font-size: 10px;
  cursor: grab;
  letter-spacing: -2px;
  margin-right: 2px;
}
.drag-handle:active { cursor: grabbing; }

/* === MEMO CELL === */
.memo-cell input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 12px;
  padding: 4px 8px;
  color: var(--ink);
  outline: none;
  border-radius: 4px;
  font-family: inherit;
  transition: background 0.15s;
}
.memo-cell input::placeholder { color: var(--faint); }
.memo-cell input:focus {
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 1px var(--accent);
}

/* === MODALS === */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(43, 40, 35, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  min-width: 420px;
  max-height: 82vh;
  overflow-y: auto;
  box-shadow: 0 10px 40px rgba(43, 40, 35, 0.12), 0 2px 6px rgba(43, 40, 35, 0.04);
  color: var(--ink);
}

.modal h2 {
  font-family: 'Charter', 'Iowan Old Style', 'Palatino', 'Georgia', serif;
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 16px;
  color: var(--ink);
  letter-spacing: -0.015em;
}

.form { display: flex; flex-direction: column; gap: 10px; }
.form input, .form select, .form textarea {
  padding: 10px 12px;
  border: 1px solid var(--border-strong);
  background: var(--surface-hi);
  color: var(--ink);
  border-radius: 8px;
  font-size: 13.5px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form input:focus, .form select:focus, .form textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.form input::placeholder, .form textarea::placeholder { color: var(--faint); }
.form textarea { resize: vertical; min-height: 80px; }
.form fieldset { border: none; padding: 0; margin: 8px 0; }
.form legend { font-weight: 600; font-size: 13px; margin-bottom: 8px; color: var(--ink-2); }
.form label { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 4px 0; cursor: pointer; }
.form button { margin-top: 4px; }

/* === MEMBER PANEL === */
.member-panel {
  position: fixed;
  right: 0; top: 65px;
  width: 380px;
  height: calc(100vh - 65px);
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -6px 0 30px rgba(43, 40, 35, 0.08);
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 50;
  overflow-y: auto;
}
.member-panel.open { transform: translateX(0); }
.panel-content { padding: 24px; position: relative; }
.panel-content h3 {
  font-family: 'Charter', 'Iowan Old Style', 'Palatino', 'Georgia', serif;
  font-size: 18px;
  font-weight: 500;
  margin-top: 26px;
  margin-bottom: 4px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.member-grade { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.panel-content h4 {
  font-size: 11px;
  font-weight: 600;
  margin-top: 20px;
  margin-bottom: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.history-table { display: flex; flex-direction: column; gap: 6px; }
.history-row {
  padding: 9px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 12.5px;
}

.project-badge {
  display: inline-block;
  padding: 3px 9px;
  background: var(--project-color, var(--accent));
  color: white;
  border-radius: 999px;
  font-weight: 500;
  font-size: 11px;
}
.week-range { color: var(--muted); font-size: 11px; }

.events-list { display: flex; flex-direction: column; gap: 8px; }
.event-item {
  padding: 11px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}
.event-type {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 600;
  color: white;
  margin-right: 6px;
  letter-spacing: 0.2px;
}
.badge-전배 { background: var(--danger); }
.badge-이동 { background: var(--warn); }
.badge-평가 { background: var(--ok); }
.event-date { font-size: 11px; color: var(--muted); }
.event-note { font-size: 12.5px; margin-top: 6px; color: var(--ink); }
.no-data { font-size: 12px; color: var(--faint); font-style: italic; margin: 8px 0; }

/* === MEMBER TABLE (manage modal) === */
.member-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.member-table th, .member-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  color: var(--ink);
}
.member-table th {
  background: var(--surface-2);
  font-weight: 600;
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.edit-input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border-strong);
  background: var(--surface-hi);
  color: var(--ink);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.edit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

/* === SCROLLBARS === */
.timeline-rows::-webkit-scrollbar,
.member-panel::-webkit-scrollbar,
.modal::-webkit-scrollbar { width: 10px; height: 10px; }
.timeline-rows::-webkit-scrollbar-track,
.member-panel::-webkit-scrollbar-track,
.modal::-webkit-scrollbar-track { background: transparent; }
.timeline-rows::-webkit-scrollbar-thumb,
.member-panel::-webkit-scrollbar-thumb,
.modal::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
.timeline-rows::-webkit-scrollbar-thumb:hover,
.member-panel::-webkit-scrollbar-thumb:hover,
.modal::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    </style>
</head>
<body x-data="app()" x-init="await init(); $watch('projects', () => {}, { deep: true })" @selectstart.prevent>



  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <h1>📊 인력 관리 타임라인</h1>
      <div class="year-nav">
        <button @click="prevYear()" class="btn-icon">◀</button>
        <span class="year-display" x-text="`${currentYear}년`"></span>
        <button @click="nextYear()" class="btn-icon">▶</button>
      </div>
      <div class="filters">
        <select x-model="filterTask" class="filter-select" title="업무 필터">
          <option value="">전체 업무</option>
          <template x-for="t in uniqueTasks" :key="t">
            <option :value="t" x-text="t"></option>
          </template>
        </select>
        <select x-model="filterMemberId" class="filter-select" title="구성원 필터">
          <option value="">전체 구성원</option>
          <template x-for="m in allMembers" :key="m.id">
            <option :value="m.id" x-text="`${m.name} (${m.task || '-'})`"></option>
          </template>
        </select>
        <button x-show="filterTask || filterMemberId"
                @click="filterTask=''; filterMemberId=''"
                class="btn-icon" title="필터 해제">✕</button>
      </div>
    </div>
    <div class="header-right">
      <button @click="showAddProjectModal = true" class="btn btn-primary">+ 프로젝트</button>
      <button @click="showManageMembersModal = true" class="btn">구성원 관리</button>
      <button @click="exportJSON()" class="btn">내보내기</button>
      <button @click="importJSON()" class="btn">가져오기</button>
      <input type="file" id="import-file" accept=".json" @change="handleFileImport" style="display:none;">
    </div>
  </header>

  <!-- MAIN TIMELINE GRID -->
  <main class="timeline-container">
    <!-- HEADER ROW (weeks) -->
    <div class="timeline-grid header-row">
      <div class="name-cell header-name">프로젝트 / 구성원</div>
      <div class="cell header-cell header-info" title="이 구성원이 오늘 주차에 이 프로젝트에서 활성 배정되어 있는지 표시">현재</div>
      <div class="cell header-cell header-info memo-header">메모</div>
      <template x-for="(week, idx) in weekHeaders" :key="idx">
        <div class="cell header-cell week-header">
          <div class="week-num" x-text="week.num"></div>
          <div class="week-date" x-text="week.start"></div>
          <div class="week-date" x-text="week.end"></div>
        </div>
      </template>
    </div>

    <!-- PROJECT ROWS + MEMBER SUB-ROWS -->
    <div class="timeline-rows">
      <template x-for="project in visibleProjects" :key="project.id">
        <div style="display: contents">
        <!-- PROJECT ROW -->
        <div class="row project-row"
             :class="{'drop-target': dropHoverProjectId === project.id}"
             :style="`--project-color: ${project.color};`">
          <div class="name-cell project-name"
               @click="toggleProject(project.id)"
               @dragover.prevent="onProjectDragOver($event, project.id)"
               @dragleave="onProjectDragLeave(project.id)"
               @drop="onMemberDrop($event, project.id)">
            <span x-show="isExpanded(project.id)">▼</span>
            <span x-show="!isExpanded(project.id)">▶</span>
            <span class="project-color-dot" :style="`background:${project.color}`"></span>
            <span x-text="project.name"></span>
            <span class="spacer"></span>
            <button @click.stop="addMemberTargetProjectId = project.id; showAddMemberModal = true;" class="btn-icon-small">+ 구성원</button>
            <button @click.stop="deleteProject(project.id)" class="btn-icon-small btn-danger" title="프로젝트 삭제">✕</button>
          </div>
          <div class="cell info-cell"></div>
          <div class="cell info-cell"></div>
          <template x-for="(week, weekIdx) in weekHeaders" :key="`project-${project.id}-${weekIdx}`">
            <div
              class="cell project-cell"
              :class="{
                'filled': isProjectWeekFilled(project.id, weekIdx),
                'preview': isProjectCellInDragPreview(project.id, weekIdx),
                'has-memo': !!getProjectWeekMemo(project.id, weekIdx)
              }"
              :title="getProjectWeekMemo(project.id, weekIdx)"
              @mousedown="startDrag('project', project.id, weekIdx)"
              @mouseover="updateDragPreview('project', project.id, weekIdx)"
              @dblclick.prevent="editProjectWeekMemo(project.id, weekIdx)"
            ></div>
          </template>
        </div>

        <!-- MEMBER ROWS (shown when project expanded) -->
        <template x-for="member in (isExpanded(project.id) ? project.members : [])" :key="`member-${project.id}-${member.id}`">
          <div class="row member-row" :style="`--project-color: ${project.color};`">

  <!-- Scripts -->
  <script src="app.js"></script>

  <script>
// === DAY.JS PLUGIN REGISTRATION (must be before app() definition) ===
// Wait for Day.js plugins to load (they're loaded from CDN)
if (typeof dayjs_plugin_isoWeek !== 'undefined') {
  dayjs.extend(dayjs_plugin_isoWeek);
}
if (typeof dayjs_plugin_weekOfYear !== 'undefined') {
  dayjs.extend(dayjs_plugin_weekOfYear);
}

// === DEXIE.JS INITIALIZATION ===
const db = new Dexie('WeeklyStaffDB');
db.version(1).stores({
  members:     '++id, name, department, grade, status',
  projects:    '++id, name, year, sortOrder',
  assignments: '++id, [memberId+projectId], memberId, projectId',
  events:      '++id, memberId, type, date'
});

// === ALPINE.JS APP ===
function app() {
  return {
    // ========== STATE ==========
    currentYear: new Date().getFullYear(),

    // Projects with members loaded
    projects: [],
    allMembers: [],
    expandedProjects: {},

    // Drag state
    drag: {
      active: false,
      rowType: null,     // 'project' | 'member'
      rowId: null,       // projectId or 'projectId-memberId'
      startWeek: null,   // week index 0-51
      endWeek: null,
      mode: 'fill'       // 'fill' | 'erase'
    },

    // Right panel
    filterTask: '',
    filterMemberId: '',

    selectedMember: null,
    memberAssignmentHistory: [],
    memberEvents: [],

    // Modals
    showAddProjectModal: false,
    showAddMemberModal: false,
    showCreateMemberModal: false,
    showLogEventModal: false,
    showManageMembersModal: false,
    addMemberTargetProjectId: null,
    logEventTargetMemberId: null,
    editingMemberId: null,

    // Form data
    newProject: { name: '', color: '#3b82f6' },
    newMember: { memberId: null },
    createMember: { name: '', task: '', years: '' },
    editMemberForm: { name: '', task: '', years: '' },
    logEventForm: { type: '전배', date: dayjs().format('YYYY-MM-DD'), note: '', score: null },

    // ========== INITIALIZATION ==========
    async init() {
      appInstance = this;
      await this.loadTimeline();
    },

    get weekHeaders() {
      const jan4 = dayjs(`${this.currentYear}-01-04`);
      const firstMonday = jan4.startOf('week');
      return Array.from({ length: 52 }, (_, i) => {
        const monday = firstMonday.add(i, 'week');
        const friday = monday.add(4, 'day');
        return {
          num: `W${String(i + 1).padStart(2, '0')}`,
          start: monday.format('MM/DD'),
          end: friday.format('MM/DD')
        };
      });
    },

    get currentWeekKey() {
      const now = dayjs();
      const year = now.year();
      const jan4 = dayjs(`${year}-01-04`);
      const firstMonday = jan4.startOf('week');
      const diffWeeks = now.startOf('week').diff(firstMonday, 'week') + 1;
      return `${year}-W${String(diffWeeks).padStart(2, '0')}`;
    },

    isMemberActiveNow(projectId, memberId) {
      const project = this.projects.find(p => p.id === projectId);
      if (!project) return false;
      const member = project.members.find(m => m.id === memberId);
      if (!member) return false;
      return member.weeks.has(this.currentWeekKey);
    },

    async loadTimeline() {
      try {
        const projects = await db.projects.where('year').equals(this.currentYear).toArray();
        const assignments = await db.assignments.toArray();
        const rawMembers = await db.members.toArray();
        const members = rawMembers.map(m => ({
          ...m,
          task: m.task ?? m.department ?? '',
          years: m.years ?? m.grade ?? ''
        }));

        this.allMembers = members;
        const today = dayjs().format('YYYY-MM-DD');

        // Build projects with members
        const newProjects = projects.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).map(project => {
          const projectAssignments = assignments.filter(a => a.projectId === project.id);
          const projectMembers = projectAssignments.map(assign => {
            const member = members.find(m => m.id === assign.memberId);
            const weeks = new Set(assign.weeks || []);

            // Calculate active project count for today (current date)
            const activeProjectCount = assignments.filter(a => a.memberId === assign.memberId)
              .filter(a => {
                const projAssign = assignments.find(x => x.id === a.id);
                return projAssign && projAssign.weeks.some(w => this.isWeekInCurrentDate(w));
              }).length;

            // Calculate start and end dates
            const dateRange = this.calculateDateRange(weeks);

            return {
              ...member,
              assignmentId: assign.id,
              memo: assign.memo || '',
              weeks: weeks,
              activeProjectCount: activeProjectCount,
              startDate: dateRange.start,
              endDate: dateRange.end
            };
          });

          return {
            ...project,
            members: projectMembers,
            weeks: new Set(project.weeks || []),
            weekMemos: project.weekMemos || {}
          };
        });

        // Force Alpine reactivity by replacing the entire array
        this.projects = [];
        await new Promise(r => setTimeout(r, 0));
        this.projects = newProjects;
      } catch (err) {
        console.error('Error loading timeline:', err);
      }
    },

    isWeekInCurrentDate(weekKey) {
      // Check if current date falls within the given ISO week (Mon-Fri)
      const today = dayjs();
      try {
        // Parse YYYY-WXX format
        const match = weekKey.match(/(\d{4})-W(\d{2})/);
        if (!match) return false;
        const year = parseInt(match[1]);
        const week = parseInt(match[2]);

        // Calculate the Monday of the given week
        const jan4 = dayjs(`${year}-01-04`, 'YYYY-MM-DD');
        const weekStart = jan4.startOf('week').add(week - 1, 'week');
        const weekEnd = weekStart.add(4, 'day'); // Friday

        return today.isSameOrAfter(weekStart) && today.isSameOrBefore(weekEnd);
      } catch (err) {
        return false;
      }
    },

    calculateDateRange(weeks) {
      if (!weeks || weeks.size === 0) return { start: '-', end: '-' };

      try {
        const sortedWeeks = Array.from(weeks).sort();
        const firstWeek = sortedWeeks[0];
        const lastWeek = sortedWeeks[sortedWeeks.length - 1];

        // Parse first week (Monday)
        const firstMatch = firstWeek.match(/(\d{4})-W(\d{2})/);
        const firstYear = parseInt(firstMatch[1]);
        const firstWk = parseInt(firstMatch[2]);
        const firstJan4 = dayjs(`${firstYear}-01-04`, 'YYYY-MM-DD');
        const firstMonday = firstJan4.startOf('week').add(firstWk - 1, 'week').format('YYYY-MM-DD');

        // Parse last week (Friday)
        const lastMatch = lastWeek.match(/(\d{4})-W(\d{2})/);
        const lastYear = parseInt(lastMatch[1]);
        const lastWk = parseInt(lastMatch[2]);
        const lastJan4 = dayjs(`${lastYear}-01-04`, 'YYYY-MM-DD');
        const lastFriday = lastJan4.startOf('week').add(lastWk - 1, 'week').add(4, 'day').format('YYYY-MM-DD');

        return { start: firstMonday, end: lastFriday };
      } catch (err) {
        return { start: '-', end: '-' };
      }
    },

    // ========== WEEK INDEX ↔ WEEK KEY CONVERSION ==========
    weekIdxToKey(idx) {
      // Fallback: year-W01 to year-W52 (simple sequential numbering)
      return `${this.currentYear}-W${String(idx + 1).padStart(2, '0')}`;
    },

    weekKeyToIdx(weekKey) {
      // Parse YYYY-WXX format directly
      const match = weekKey.match(/\d+-W(\d+)/);
      return match ? parseInt(match[1]) - 1 : 0;
    },

    // ========== PROJECT ACTIONS ==========
    async addProject() {
      if (!this.newProject.name.trim()) return;

      const maxOrder = this.projects.length > 0
        ? Math.max(...this.projects.map(p => p.sortOrder || 0))
        : 0;

      await db.projects.add({
        name: this.newProject.name,
        year: this.currentYear,
        color: this.newProject.color,
        sortOrder: maxOrder + 1
      });

      this.newProject = { name: '', color: '#3b82f6' };
      this.showAddProjectModal = false;
      await this.loadTimeline();
    },

    async deleteProject(projectId) {
      const project = this.projects.find(p => p.id === projectId);
      const label = project ? project.name : '이 프로젝트';
      if (!confirm(`"${label}" 프로젝트를 삭제합니다.\n이 프로젝트의 모든 구성원 배정도 함께 삭제됩니다.\n계속하시겠습니까?`)) return;
      await db.assignments.where('projectId').equals(projectId).delete();
      await db.projects.delete(projectId);
      const next = { ...this.expandedProjects };
      delete next[projectId];
      this.expandedProjects = next;
      await this.loadTimeline();
    },

    toggleProject(projectId) {
      this.expandedProjects = {
        ...this.expandedProjects,
        [projectId]: !this.expandedProjects[projectId]
      };
    },

    isExpanded(projectId) {
      return !!this.expandedProjects[projectId];
    },

    get uniqueTasks() {
      return [...new Set(this.allMembers.map(m => m.task))].filter(Boolean).sort();
    },

    get visibleProjects() {
      const memId = this.filterMemberId ? parseInt(this.filterMemberId) : null;
      const task = this.filterTask;
      if (!memId && !task) return this.projects;
      return this.projects
        .map(p => ({
          ...p,
          members: p.members.filter(m => {
            if (memId && m.id !== memId) return false;
            if (task && m.task !== task) return false;
            return true;
          })
        }))
        .filter(p => p.members.length > 0);
    },

    // ========== MEMBER ACTIONS ==========
    async addMemberToProject() {
      if (!this.newMember.memberId || !this.addMemberTargetProjectId) return;

      const memberId = parseInt(this.newMember.memberId);
      const projectId = parseInt(this.addMemberTargetProjectId);

      const existing = await db.assignments.where('[memberId+projectId]')
        .equals([memberId, projectId])
        .first();

      if (!existing) {
        await db.assignments.add({
          memberId: memberId,
          projectId: projectId,
          weeks: [],
          memo: ''
        });
      }

      this.expandedProjects = { ...this.expandedProjects, [projectId]: true };
      this.newMember = { memberId: null };
      this.addMemberTargetProjectId = null;
      this.showAddMemberModal = false;
      await this.loadTimeline();
    },

    beginEditMember(member) {
      this.editingMemberId = member.id;
      this.editMemberForm = {
        name: member.name || '',
        task: member.task || '',
        years: member.years || ''
      };
    },

    cancelEditMember() {
      this.editingMemberId = null;
      this.editMemberForm = { name: '', task: '', years: '' };
    },

    async saveEditMember() {
      if (!this.editingMemberId) return;
      if (!this.editMemberForm.name.trim()) return;
      await db.members.update(this.editingMemberId, {
        name: this.editMemberForm.name.trim(),
        task: this.editMemberForm.task.trim(),
        years: this.editMemberForm.years.trim()
      });
      this.editingMemberId = null;
      await this.loadTimeline();
      if (this.selectedMember) {
        await this.selectMember(this.selectedMember.id);
      }
    },

    async deleteMember(memberId) {
      const member = this.allMembers.find(m => m.id === memberId);
      const label = member ? member.name : '이 구성원';
      if (!confirm(`${label} 구성원을 삭제합니다.\n관련된 모든 프로젝트 배정과 이벤트도 함께 삭제됩니다.\n계속하시겠습니까?`)) return;
      await db.assignments.where('memberId').equals(memberId).delete();
      await db.events.where('memberId').equals(memberId).delete();
      await db.members.delete(memberId);
      if (this.selectedMember?.id === memberId) this.selectedMember = null;
      this.editingMemberId = null;
      await this.loadTimeline();
    },

    dropHoverProjectId: null,

    onMemberDragStart(evt, projectId, memberId, assignmentId) {
      const payload = JSON.stringify({ projectId, memberId, assignmentId });
      evt.dataTransfer.effectAllowed = 'copyMove';
      evt.dataTransfer.setData('application/x-member-assignment', payload);
      evt.dataTransfer.setData('text/plain', payload);
    },

    onProjectDragOver(evt, projectId) {
      evt.preventDefault();
      evt.dataTransfer.dropEffect = evt.ctrlKey || evt.metaKey ? 'copy' : 'move';
      this.dropHoverProjectId = projectId;
    },

    onProjectDragLeave(projectId) {
      if (this.dropHoverProjectId === projectId) this.dropHoverProjectId = null;
    },

    async onMemberDrop(evt, targetProjectId) {
      evt.preventDefault();
      this.dropHoverProjectId = null;
      const raw = evt.dataTransfer.getData('application/x-member-assignment')
                  || evt.dataTransfer.getData('text/plain');
      if (!raw) return;
      let payload;
      try { payload = JSON.parse(raw); } catch { return; }
      const { projectId: srcProjectId, memberId, assignmentId } = payload;
      if (!assignmentId || !memberId || srcProjectId === targetProjectId) return;

      const copy = evt.ctrlKey || evt.metaKey;
      const srcAssign = await db.assignments.get(assignmentId);
      if (!srcAssign) return;

      const existing = await db.assignments
        .where('[memberId+projectId]').equals([memberId, targetProjectId]).first();

      if (existing) {
        const mergedWeeks = [...new Set([...(existing.weeks || []), ...(srcAssign.weeks || [])])];
        const mergedMemo = [existing.memo, srcAssign.memo].filter(Boolean).join(' / ');
        await db.assignments.update(existing.id, { weeks: mergedWeeks, memo: mergedMemo });
        if (!copy) await db.assignments.delete(assignmentId);
      } else if (copy) {
        await db.assignments.add({
          memberId,
          projectId: targetProjectId,
          weeks: [...(srcAssign.weeks || [])],
          memo: srcAssign.memo || ''
        });
      } else {
        await db.assignments.update(assignmentId, { projectId: targetProjectId });
      }
      this.expandedProjects = { ...this.expandedProjects, [targetProjectId]: true };
      await this.loadTimeline();
    },

    async updateMemo(assignmentId, value) {
      await db.assignments.update(assignmentId, { memo: value });
      for (const project of this.projects) {
        const m = project.members.find(mm => mm.assignmentId === assignmentId);
        if (m) { m.memo = value; break; }
      }
    },

    async createNewMember() {
      if (!this.createMember.name.trim()) return;

      const memberId = await db.members.add({
        name: this.createMember.name.trim(),
        task: this.createMember.task.trim(),
        years: this.createMember.years.trim(),
        status: 'active',
        skills: []
      });

      // Optionally add to the target project if one was selected
      if (this.addMemberTargetProjectId) {
        await db.assignments.add({
          memberId,
          projectId: this.addMemberTargetProjectId,
          weeks: [],
          memo: ''
        });
        this.expandedProjects = { ...this.expandedProjects, [this.addMemberTargetProjectId]: true };
      }

      this.createMember = { name: '', task: '', years: '' };
      this.showCreateMemberModal = false;
      this.addMemberTargetProjectId = null;
      await this.loadTimeline();
    },

    async selectMember(memberId) {
      const member = this.allMembers.find(m => m.id === memberId);
      if (!member) return;

      this.selectedMember = member;

      // Load assignment history across all years and projects
      const assignments = await db.assignments.where('memberId').equals(memberId).toArray();
      const projects = await db.projects.toArray();

      this.memberAssignmentHistory = assignments.map(assign => {
        const project = projects.find(p => p.id === assign.projectId);
        return {
          ...assign,
          projectName: project?.name || '(삭제된 프로젝트)',
        };
      });

      // Load events
      this.memberEvents = await db.events.where('memberId').equals(memberId).reverse().toArray();
    },

    openLogEventModal(memberId) {
      this.logEventTargetMemberId = memberId;
      this.showLogEventModal = true;
      this.logEventForm = { type: '전배', date: this.getTodayDate(), note: '', score: null };
    },

    async logEvent() {
      if (!this.logEventTargetMemberId) return;

      await db.events.add({
        memberId: this.logEventTargetMemberId,
        type: this.logEventForm.type,
        date: this.logEventForm.date,
        note: this.logEventForm.note,
        score: this.logEventForm.score,
        fromProject: null,
        toProject: null
      });

      this.showLogEventModal = false;
      await this.selectMember(this.logEventTargetMemberId);
    },

    // ========== DRAG LOGIC ==========
    _pendingSingleApply: null,

    startDrag(rowType, rowId, weekIdx) {
      if (this._pendingSingleApply) {
        clearTimeout(this._pendingSingleApply);
        this._pendingSingleApply = null;
      }
      this.drag.active = true;
      this.drag.rowType = rowType;
      this.drag.rowId = rowId;
      this.drag.startWeek = weekIdx;
      this.drag.endWeek = weekIdx;

      // Determine mode based on current cell state
      if (rowType === 'project') {
        this.drag.mode = this.isProjectWeekFilled(rowId, weekIdx) ? 'erase' : 'fill';
      } else {
        const [projId, memberId] = rowId.split('-');
        this.drag.mode = this.isMemberWeekFilled(projId, memberId, weekIdx) ? 'erase' : 'fill';
      }

      document.addEventListener('mouseup', () => this.endDrag(), { once: true });
    },

    updateDragPreview(rowType, rowId, weekIdx) {
      if (!this.drag.active || this.drag.rowType !== rowType || this.drag.rowId !== rowId) return;
      this.drag.endWeek = weekIdx;
    },

    async endDrag() {
      if (!this.drag.active) return;

      const [start, end] = [
        Math.min(this.drag.startWeek, this.drag.endWeek),
        Math.max(this.drag.startWeek, this.drag.endWeek)
      ];

      const rowType = this.drag.rowType;
      const rowId = this.drag.rowId;
      const mode = this.drag.mode;
      this.drag.active = false;

      if (rowType === 'project' && start === end) {
        this._pendingSingleApply = setTimeout(async () => {
          this._pendingSingleApply = null;
          await this.applyDragRange(rowId, start, end, mode);
        }, 250);
        return;
      }
      await this.applyDragRange(rowId, start, end, mode);
    },

    async editProjectWeekMemo(projectId, weekIdx) {
      if (this._pendingSingleApply) {
        clearTimeout(this._pendingSingleApply);
        this._pendingSingleApply = null;
      }
      const project = this.projects.find(p => p.id === projectId);
      if (!project) return;
      const weekKey = this.weekIdxToKey(weekIdx);
      const existing = project.weekMemos?.[weekKey] || '';
      const value = prompt(`${project.name} · ${weekKey} 메모`, existing);
      if (value === null) return;
      const memos = { ...(project.weekMemos || {}) };
      if (value.trim()) memos[weekKey] = value.trim();
      else delete memos[weekKey];
      await db.projects.update(projectId, { weekMemos: memos });
      await this.loadTimeline();
    },

    getProjectWeekMemo(projectId, weekIdx) {
      const project = this.projects.find(p => p.id === projectId);
      if (!project || !project.weekMemos) return '';
      return project.weekMemos[this.weekIdxToKey(weekIdx)] || '';
    },

    async applyDragRange(rowId, startIdx, endIdx, mode) {
      const weekKeys = [];
      for (let i = startIdx; i <= endIdx; i++) {
        weekKeys.push(this.weekIdxToKey(i));
      }

      if (this.drag.rowType === 'project') {
        const project = this.projects.find(p => p.id === rowId);
        if (!project) return;

        if (mode === 'fill') {
          weekKeys.forEach(w => project.weeks.add(w));
        } else {
          weekKeys.forEach(w => project.weeks.delete(w));
        }
        await db.projects.update(project.id, {
          weeks: Array.from(project.weeks)
        });
        await this.loadTimeline();
      } else {
        // Update member weeks within project
        const [projId, memberId] = rowId.split('-');
        const project = this.projects.find(p => p.id === parseInt(projId));
        const member = project?.members.find(m => m.id === parseInt(memberId));
        if (!member) return;

        if (mode === 'fill') {
          weekKeys.forEach(w => member.weeks.add(w));
        } else {
          weekKeys.forEach(w => member.weeks.delete(w));
        }

        // Update DB
        await db.assignments.update(member.assignmentId, {
          weeks: Array.from(member.weeks)
        });
      }
    },

    isProjectWeekFilled(projectId, weekIdx) {
      const project = this.projects.find(p => p.id === projectId);
      if (!project) return false;
      const weekKey = this.weekIdxToKey(weekIdx);
      return project.weeks.has(weekKey);
    },

    isMemberWeekFilled(projectId, memberId, weekIdx) {
      const project = this.projects.find(p => p.id === projectId);
      if (!project) return false;
      const member = project.members.find(m => m.id === memberId);
      if (!member) return false;
      const weekKey = this.weekIdxToKey(weekIdx);
      return member.weeks.has(weekKey);
    },

    isProjectCellInDragPreview(projectId, weekIdx) {
      if (!this.drag.active || this.drag.rowType !== 'project' || this.drag.rowId !== projectId) return false;
      const [s, e] = [
        Math.min(this.drag.startWeek, this.drag.endWeek),
        Math.max(this.drag.startWeek, this.drag.endWeek)
      ];
      return weekIdx >= s && weekIdx <= e;
    },

    isMemberCellInDragPreview(projectId, memberId, weekIdx) {
      const rowId = `${projectId}-${memberId}`;
      if (!this.drag.active || this.drag.rowType !== 'member' || this.drag.rowId !== rowId) return false;
      const [s, e] = [
        Math.min(this.drag.startWeek, this.drag.endWeek),
        Math.max(this.drag.startWeek, this.drag.endWeek)
      ];
      return weekIdx >= s && weekIdx <= e;
    },

    // ========== YEAR NAVIGATION ==========
    prevYear() {
      this.currentYear--;
      this.loadTimeline();
    },

    nextYear() {
      this.currentYear++;
      this.loadTimeline();
    },

    // ========== IMPORT / EXPORT ==========
    async exportJSON() {
      const [members, projects, assignments, events] = await Promise.all([
        db.members.toArray(),
        db.projects.toArray(),
        db.assignments.toArray(),
        db.events.toArray()
      ]);

      const payload = {
        exportedAt: new Date().toISOString(),
        members,
        projects,
        assignments,
        events
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `weekly-staff-export-${dayjs().format('YYYY-MM-DD')}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    },

    importJSON() {
      document.getElementById('import-file').click();
    },

    async handleFileImport(event) {
      const file = event.target.files[0];
      if (!file) return;

      const text = await file.text();
      const payload = JSON.parse(text);

      const confirmed = confirm(
        `이 작업은 모든 데이터를 초기화하고 가져온 데이터로 덮어씁니다.\n계속하시겠습니까?`
      );
      if (!confirmed) return;

      await db.transaction('rw', db.members, db.projects, db.assignments, db.events, async () => {
        await db.members.clear();
        await db.projects.clear();
        await db.assignments.clear();
        await db.events.clear();

        if (payload.members?.length) await db.members.bulkAdd(payload.members);
        if (payload.projects?.length) await db.projects.bulkAdd(payload.projects);
        if (payload.assignments?.length) await db.assignments.bulkAdd(payload.assignments);
        if (payload.events?.length) await db.events.bulkAdd(payload.events);
      });

      await this.loadTimeline();
      document.getElementById('import-file').value = '';
    },

    // ========== UTILITIES ==========
    getTodayDate() {
      return dayjs().format('YYYY-MM-DD');
    },

    formatWeekRange(weeks) {
      if (!weeks || weeks.size === 0) return '(배정 없음)';
      const sorted = Array.from(weeks).sort();
      return sorted.join(', ');
    }
  };
}

// === GLOBAL APP REFERENCE ===
let appInstance = null;

// === SEED DATA IMPORT HELPER ===
window.importSeedData = async function(seedJSON) {
  const payload = typeof seedJSON === 'string' ? JSON.parse(seedJSON) : seedJSON;

  await db.transaction('rw', db.members, db.projects, db.assignments, db.events, async () => {
    if (payload.members?.length) await db.members.bulkAdd(payload.members);
    if (payload.projects?.length) await db.projects.bulkAdd(payload.projects);
    if (payload.assignments?.length) await db.assignments.bulkAdd(payload.assignments);
    if (payload.events?.length) await db.events.bulkAdd(payload.events);
  });

  // Reload timeline in app instance if available
  if (appInstance && appInstance.loadTimeline) {
    await appInstance.loadTimeline();
    console.log('✓ Seed data imported and timeline reloaded');
  } else {
    console.log('✓ Seed data imported. Reload the page to see changes.');
  }
};
