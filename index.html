<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 인력 관리 - 타임라인</title>

  <!-- Day.js + plugins (sync, before Alpine) -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/plugin/isoWeek.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.21/plugin/weekOfYear.js"></script>

  <!-- Dexie.js (sync, must load before Alpine) -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.4.4/dist/dexie.js"></script>

  <!-- Alpine.js (defer - loads last after Dexie is ready) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body x-data="app()" x-init="await init(); $watch('projects', () => {}, { deep: true })" @selectstart.prevent>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <h1>📊 인력 관리 타임라인</h1>
      <div class="year-nav">
        <button @click="prevYear()" class="btn-icon">◀</button>
        <span class="year-display" x-text="`${currentYear}년`"></span>
        <button @click="nextYear()" class="btn-icon">▶</button>
      </div>
      <div class="today-pill" x-text="todayLabel" title="오늘 날짜와 ISO 주차"></div>
      <div class="filters">
        <div class="task-filter" @click.outside="showTaskFilter = false">
          <button type="button" class="filter-select task-filter-toggle"
                  @click="showTaskFilter = !showTaskFilter"
                  x-text="taskFilterLabel"
                  :class="{'has-selection': filterTasks.length > 0 && filterTasks.length < uniqueTasks.length}"></button>
          <div class="task-filter-panel" x-show="showTaskFilter" x-cloak x-transition>
            <div class="task-filter-head">
              <button type="button" class="task-filter-linkbtn" @click="selectAllTasks()">전체 선택</button>
              <button type="button" class="task-filter-linkbtn" @click="clearAllTasks()">해제</button>
            </div>
            <div class="task-filter-list">
              <template x-for="t in uniqueTasks" :key="t">
                <label class="task-filter-item">
                  <input type="checkbox" :value="t"
                         :checked="filterTasks.includes(t)"
                         @change="toggleTaskFilter(t)">
                  <span x-text="t"></span>
                </label>
              </template>
              <div class="task-filter-empty" x-show="uniqueTasks.length === 0">등록된 업무가 없습니다</div>
            </div>
          </div>
        </div>
        <div class="task-filter" @click.outside="showMemberFilter = false">
          <button type="button" class="filter-select task-filter-toggle"
                  @click="showMemberFilter = !showMemberFilter"
                  x-text="memberFilterLabel"
                  :class="{'has-selection': filterMemberIds.length > 0 && filterMemberIds.length < allMembers.length}"></button>
          <div class="task-filter-panel" x-show="showMemberFilter" x-cloak x-transition>
            <div class="task-filter-head">
              <button type="button" class="task-filter-linkbtn" @click="selectAllMembers()">전체 선택</button>
              <button type="button" class="task-filter-linkbtn" @click="clearAllMembers()">해제</button>
            </div>
            <div class="task-filter-list">
              <template x-for="m in allMembers" :key="m.id">
                <label class="task-filter-item">
                  <input type="checkbox" :value="m.id"
                         :checked="filterMemberIds.includes(m.id)"
                         @change="toggleMemberFilter(m.id)">
                  <span x-text="`${m.name} · ${m.task || '-'}`"></span>
                </label>
              </template>
              <div class="task-filter-empty" x-show="allMembers.length === 0">등록된 구성원이 없습니다</div>
            </div>
          </div>
        </div>
        <button x-show="filterTasks.length > 0 || filterMemberIds.length > 0"
                @click="filterTasks=[]; filterMemberIds=[]"
                class="btn-icon" title="필터 해제">✕</button>
      </div>
    </div>
    <div class="header-right">
      <button @click="showAddProjectModal = true" class="btn btn-primary">+ 프로젝트</button>
      <button @click="showManageMembersModal = true" class="btn">구성원 관리</button>
      <button @click="exportJSON()" class="btn">내보내기</button>
      <button @click="importJSON()" class="btn">가져오기</button>
      <input type="file" id="import-file" accept=".json" @change="handleFileImport" style="display:none;">
    </div>
  </header>

  <!-- MAIN TIMELINE GRID -->
  <main class="timeline-container">
    <!-- HEADER ROW (weeks) -->
    <div class="timeline-grid header-row">
      <div class="name-cell header-name">프로젝트 / 구성원</div>
      <div class="cell header-cell header-info" title="이 구성원이 오늘 주차에 이 프로젝트에서 활성 배정되어 있는지 표시">현재</div>
      <div class="cell header-cell header-info memo-header">메모</div>
      <template x-for="(week, idx) in weekHeaders" :key="idx">
        <div class="cell header-cell week-header" :class="{'today-week': idx === todayWeekIdx}">
          <div class="week-num" x-text="week.num"></div>
          <div class="week-date" x-text="week.start"></div>
          <div class="week-date" x-text="week.end"></div>
        </div>
      </template>
    </div>

    <!-- PROJECT ROWS + MEMBER SUB-ROWS -->
    <div class="timeline-rows">
      <template x-for="project in visibleProjects" :key="project.id">
        <div style="display: contents">
        <!-- PROJECT ROW -->
        <div class="row project-row"
             :class="{'drop-target': dropHoverProjectId === project.id}"
             :style="`--project-color: ${project.color};`">
          <div class="name-cell project-name"
               @click="toggleProject(project.id)"
               @dragover.prevent="onProjectDragOver($event, project.id)"
               @dragleave="onProjectDragLeave(project.id)"
               @drop="onMemberDrop($event, project.id)">
            <span x-show="isExpanded(project.id)">▼</span>
            <span x-show="!isExpanded(project.id)">▶</span>
            <span class="project-color-dot" :style="`background:${project.color}`"></span>
            <span x-text="project.name"></span>
            <span class="spacer"></span>
            <button @click.stop="addMemberTargetProjectId = project.id; showAddMemberModal = true;" class="btn-square" title="구성원 추가">+</button>
            <button @click.stop="deleteProject(project.id)" class="btn-square btn-square-danger" title="프로젝트 삭제">✕</button>
          </div>
          <div class="cell info-cell"></div>
          <div class="cell info-cell"></div>
          <template x-for="(week, weekIdx) in weekHeaders" :key="`project-${project.id}-${weekIdx}`">
            <div
              class="cell project-cell"
              :class="{
                'filled': isProjectWeekFilled(project.id, weekIdx),
                'preview': isProjectCellInDragPreview(project.id, weekIdx),
                'has-memo': !!getProjectWeekMemo(project.id, weekIdx),
                'today-week': weekIdx === todayWeekIdx
              }"
              :title="getProjectWeekMemo(project.id, weekIdx)"
              @mousedown="startDrag('project', project.id, weekIdx)"
              @mouseover="updateDragPreview('project', project.id, weekIdx)"
              @dblclick.prevent="editProjectWeekMemo(project.id, weekIdx)"
            ></div>
          </template>
        </div>

        <!-- MEMBER ROWS (shown when project expanded) -->
        <template x-for="member in (isExpanded(project.id) ? project.members : [])" :key="`member-${project.id}-${member.id}`">
          <div class="row member-row" :style="`--project-color: ${project.color};`">
            <div class="name-cell member-name"
                 draggable="true"
                 @dragstart="onMemberDragStart($event, project.id, member.id, member.assignmentId)"
                 @click="selectMember(member.id)"
                 title="드래그하여 다른 프로젝트로 이동 · Ctrl+드래그로 복사">
              <span class="drag-handle">⋮⋮</span>
              <span x-text="member.name" class="member-name-text"></span>
              <button class="btn-square btn-square-danger btn-square-xs"
                      @click.stop="removeMemberFromProject(member.assignmentId, member.name, project.name)"
                      title="이 프로젝트에서 제외">✕</button>
            </div>
            <div class="cell info-cell current-cell"
                 :title="isMemberActiveNow(project.id, member.id) ? '현재 주차에 이 프로젝트에서 활성' : '현재 주차에 미배정'">
              <span class="current-dot"
                    :class="{'active': isMemberActiveNow(project.id, member.id)}"
                    :style="isMemberActiveNow(project.id, member.id) ? `background:${project.color};box-shadow:0 0 0 3px ${project.color}22` : ''"></span>
            </div>
            <div class="cell info-cell memo-cell">
              <input type="text" placeholder="메모..." :value="member.memo || ''"
                     @change="updateMemo(member.assignmentId, $event.target.value)">
            </div>
            <template x-for="(week, weekIdx) in weekHeaders" :key="`member-${project.id}-${member.id}-${weekIdx}`">
              <div
                class="cell"
                :class="{
                  'filled': isMemberWeekFilled(project.id, member.id, weekIdx),
                  'preview': isMemberCellInDragPreview(project.id, member.id, weekIdx),
                  'has-memo': !!getMemberWeekMemo(project.id, member.id, weekIdx),
                  'today-week': weekIdx === todayWeekIdx
                }"
                :title="getMemberWeekMemo(project.id, member.id, weekIdx)"
                @mousedown="startDrag('member', `${project.id}-${member.id}`, weekIdx)"
                @mouseover="updateDragPreview('member', `${project.id}-${member.id}`, weekIdx)"
                @dblclick.prevent="editMemberWeekMemo(project.id, member.id, weekIdx)"
              ></div>
            </template>
          </div>
        </template>
        </div>
      </template>
    </div>
  </main>

  <!-- RIGHT PANEL: Member Detail (Slide-in) -->
  <aside class="member-panel" :class="{'open': selectedMember !== null}">
    <template x-if="selectedMember">
      <div class="panel-content">
        <button class="btn-close" @click="selectedMember = null">✕</button>
        <h3 x-text="`${selectedMember.name} (${selectedMember.task || '-'})`"></h3>
        <p class="member-grade" x-text="`연차: ${selectedMember.years || '-'}`"></p>
        <div style="display:flex; gap:6px; margin-bottom:12px;">
          <button class="btn" @click="beginEditMember(selectedMember); showManageMembersModal = true;">편집</button>
          <button class="btn" @click="deleteMember(selectedMember.id)" style="color:#dc2626;">삭제</button>
        </div>

        <!-- Assignment History -->
        <h4>배정 이력</h4>
        <div class="history-table" x-show="memberAssignmentHistory.length > 0">
          <template x-for="assign in memberAssignmentHistory" :key="assign.id">
            <div class="history-row">
              <span class="project-badge" x-text="`${assign.projectName}`"></span>
              <span class="week-range" x-text="`${formatWeekRange(assign.weeks)}`"></span>
            </div>
          </template>
        </div>
        <p x-show="memberAssignmentHistory.length === 0" class="no-data">배정 없음</p>

        <!-- Events Timeline -->
        <h4>이벤트</h4>
        <div class="events-list" x-show="memberEvents.length > 0">
          <template x-for="evt in memberEvents" :key="evt.id">
            <div class="event-item">
              <div class="event-row">
                <span class="event-type" :class="`badge-${evt.type}`" x-text="evt.type"></span>
                <span class="event-date" x-text="evt.date"></span>
                <button class="btn-square btn-square-danger btn-square-xs event-del"
                        @click="deleteEvent(evt.id)" title="이벤트 삭제">✕</button>
              </div>
              <p class="event-note" x-text="evt.note || '(메모 없음)'"></p>
            </div>
          </template>
        </div>
        <p x-show="memberEvents.length === 0" class="no-data">이벤트 없음</p>

        <!-- Log Event Button -->
        <button @click="openLogEventModal(selectedMember.id)" class="btn btn-primary" style="width:100%; margin-top:20px;">
          + 이벤트 기록
        </button>
      </div>
    </template>
  </aside>

  <!-- MODALS -->
  <!-- Add Project Modal -->
  <div class="modal-backdrop" x-show="showAddProjectModal" @click.self="showAddProjectModal = false">
    <div class="modal">
      <h2>새 프로젝트</h2>
      <form @submit.prevent="addProject" class="form">
        <input type="text" placeholder="프로젝트명" x-model="newProject.name" required>
        <select x-model="newProject.color" required>
          <option value="#3b82f6">파랑</option>
          <option value="#ef4444">빨강</option>
          <option value="#10b981">초록</option>
          <option value="#f59e0b">주황</option>
          <option value="#8b5cf6">보라</option>
          <option value="#ec4899">핑크</option>
        </select>
        <button type="submit" class="btn btn-primary">생성</button>
        <button type="button" @click="showAddProjectModal = false" class="btn">취소</button>
      </form>
    </div>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-backdrop" x-show="showAddMemberModal" @click.self="showAddMemberModal = false">
    <div class="modal">
      <h2>새 구성원 추가</h2>
      <form @submit.prevent="addMemberToProject" class="form">
        <select x-model="newMember.memberId">
          <option value="">기존 구성원 선택</option>
          <template x-for="m in allMembers" :key="m.id">
            <option :value="m.id" x-text="`${m.name} (${m.task || '-'})`"></option>
          </template>
        </select>
        <button type="button" @click="showAddMemberModal = false; showCreateMemberModal = true;" class="btn">+ 새 구성원 생성</button>
        <button type="submit" class="btn btn-primary" :disabled="!newMember.memberId">목록에서 추가</button>
        <button type="button" @click="showAddMemberModal = false; addMemberTargetProjectId = null; newMember = {memberId: null};" class="btn">닫기</button>
      </form>
    </div>
  </div>

  <!-- Create New Member Modal -->
  <div class="modal-backdrop" x-show="showCreateMemberModal" @click.self="showCreateMemberModal = false">
    <div class="modal">
      <h2>새 구성원 생성</h2>
      <form @submit.prevent="createNewMember" class="form">
        <input type="text" placeholder="이름" x-model="createMember.name" required>
        <input type="text" placeholder="업무 (예: 프론트엔드, PM)" x-model="createMember.task">
        <input type="text" placeholder="연차 (예: 3년, 신입)" x-model="createMember.years">
        <button type="submit" class="btn btn-primary">생성</button>
        <button type="button" @click="showCreateMemberModal = false; addMemberTargetProjectId = null; createMember = {name: '', task: '', years: ''};" class="btn">닫기</button>
      </form>
    </div>
  </div>

  <!-- Log Event Modal -->
  <div class="modal-backdrop" x-show="showLogEventModal" @click.self="showLogEventModal = false">
    <div class="modal">
      <h2>이벤트 기록</h2>
      <form @submit.prevent="logEvent" class="form">
        <fieldset>
          <legend>이벤트 타입</legend>
          <label>
            <input type="radio" name="event-type" value="전배" x-model="logEventForm.type">
            전배 (부서 이동)
          </label>
          <label>
            <input type="radio" name="event-type" value="이동" x-model="logEventForm.type">
            이동 (프로젝트 이동)
          </label>
          <label>
            <input type="radio" name="event-type" value="평가" x-model="logEventForm.type">
            평가 (성과 평가)
          </label>
        </fieldset>
        <input type="date" x-model="logEventForm.date" required>
        <textarea placeholder="메모" x-model="logEventForm.note"></textarea>
        <input type="number" min="1" max="5" placeholder="점수 (평가일 때)" x-model.number="logEventForm.score">
        <button type="submit" class="btn btn-primary">기록</button>
        <button type="button" @click="showLogEventModal = false" class="btn">취소</button>
      </form>
    </div>
  </div>

  <!-- Manage Members Modal -->
  <div class="modal-backdrop" x-show="showManageMembersModal" @click.self="showManageMembersModal = false; cancelEditMember();">
    <div class="modal" style="min-width:640px; max-width:800px;">
      <h2>구성원 관리</h2>
      <p x-show="allMembers.length === 0" class="no-data">등록된 구성원이 없습니다.</p>
      <table class="member-table" x-show="allMembers.length > 0">
        <thead>
          <tr><th>이름</th><th>업무</th><th>연차</th><th style="width:150px;">작업</th></tr>
        </thead>
        <tbody>
          <template x-for="m in allMembers" :key="m.id">
            <tr>
              <template x-if="editingMemberId !== m.id">
                <td x-text="m.name"></td>
              </template>
              <template x-if="editingMemberId === m.id">
                <td><input type="text" x-model="editMemberForm.name" class="edit-input"></td>
              </template>

              <template x-if="editingMemberId !== m.id">
                <td x-text="m.task || '-'"></td>
              </template>
              <template x-if="editingMemberId === m.id">
                <td><input type="text" x-model="editMemberForm.task" class="edit-input"></td>
              </template>

              <template x-if="editingMemberId !== m.id">
                <td x-text="m.years || '-'"></td>
              </template>
              <template x-if="editingMemberId === m.id">
                <td><input type="text" x-model="editMemberForm.years" class="edit-input"></td>
              </template>

              <td>
                <template x-if="editingMemberId !== m.id">
                  <div style="display:flex; gap:4px;">
                    <button class="btn" @click="beginEditMember(m)">편집</button>
                    <button class="btn" @click="deleteMember(m.id)" style="color:#dc2626;">삭제</button>
                  </div>
                </template>
                <template x-if="editingMemberId === m.id">
                  <div style="display:flex; gap:4px;">
                    <button class="btn btn-primary" @click="saveEditMember()">저장</button>
                    <button class="btn" @click="cancelEditMember()">취소</button>
                  </div>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div style="display:flex; justify-content:space-between; gap:8px; margin-top:16px;">
        <button class="btn btn-primary" @click="showManageMembersModal = false; addMemberTargetProjectId = null; showCreateMemberModal = true;">+ 새 구성원 생성</button>
        <button class="btn" @click="showManageMembersModal = false; cancelEditMember();">닫기</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
